<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>S QUEEN Sim Database</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <style>
        :root {
            --primary: #ffff00; /* Yellow - Badla hua */
            --bg-main: #0a0a0a;
            --panel-bg: rgba(15, 15, 15, 0.85);
            --border: #ffff00; /* Yellow - Badla hua */
            --text-glow: 0 0 10px rgba(255, 255, 0, 0.6);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Courier New', Courier, monospace;
            /* Copy paste rokne ke liye text selection lock */
            -webkit-user-select: none;
            -moz-user-select: none;
            -ms-user-select: none;
            user-select: none;
        }

        body {
            background-color: var(--bg-main);
            color: var(--primary);
            overflow-x: hidden;
            min-h-screen: 100vh;
        }

        /* Matrix Canvas Background Layer */
        #matrixBg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: -1;
            opacity: 0.15;
        }

        /* Lock Screen Layout Overlay */
        #lockScreen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(5, 5, 5, 0.95);
            z-index: 9999;
            display: flex;
            justify-content: center;
            align-items: center;
            border: 4px solid var(--border);
        }

        .lock-card {
            background: #111;
            padding: 40px;
            border-radius: 5px;
            border: 2px solid var(--primary);
            text-align: center;
            max-width: 400px;
            box-shadow: 0 0 20px rgba(255, 255, 0, 0.3);
        }

        .lock-card h2 {
            font-size: 24px;
            margin: 20px 0 10px;
            letter-spacing: 3px;
            text-shadow: var(--text-glow);
        }

        .lock-card p {
            color: #aaa;
            font-size: 14px;
            margin-bottom: 25px;
            line-height: 1.5;
        }

        .btn-unlock {
            background: transparent;
            color: var(--primary);
            border: 2px solid var(--primary);
            padding: 12px 25px;
            font-weight: bold;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: all 0.3s ease;
            box-shadow: var(--text-glow);
        }

        .btn-unlock:hover {
            background: var(--primary);
            color: #000;
            box-shadow: 0 0 25px var(--primary);
        }

        /* Premium Styled Header - Red Color me badla hua */
        .header {
            text-align: center;
            padding: 30px 20px;
            margin-top: 20px;
            color: #ff0000 !important; 
        }

        .logo-area {
            font-size: 45px;
            color: #ff0000 !important;
            margin-bottom: 10px;
            animation: pulse 2s infinite;
        }

        .header h1 {
            font-size: 28px;
            letter-spacing: 2px;
            text-shadow: 0 0 10px rgba(255, 0, 0, 0.6);
            margin-bottom: 5px;
            font-weight: 900;
            color: #ff0000 !important;
        }

        /* Responsive Search Interface Box */
        .search-container {
            max-width: 600px;
            margin: 0 auto 30px;
            padding: 0 20px;
        }

        .input-box {
            display: flex;
            background: var(--panel-bg);
            border: 1px solid var(--border);
            box-shadow: 0 0 10px rgba(255,255,0,0.1);
        }

        .input-box input {
            flex: 1;
            background: transparent;
            border: none;
            padding: 15px;
            color: var(--primary);
            font-size: 16px;
            outline: none;
        }

        .input-box input::placeholder {
            color: rgba(255, 255, 0, 0.4);
        }

        .btn-search {
            background: var(--primary);
            border: none;
            color: #000;
            padding: 0 30px;
            font-weight: bold;
            font-size: 16px;
            cursor: pointer;
            letter-spacing: 2px;
            transition: all 0.2s ease;
        }

        .btn-search:hover {
            background: #fff;
            box-shadow: 0 0 15px #fff;
        }

        /* Real-Time Result Cards / Hack Console Screens */
        #resultArea {
            max-width: 600px;
            margin: 0 auto;
            padding: 0 20px;
        }

        .data-card {
            background: var(--panel-bg);
            border: 2px solid var(--border);
            padding: 25px;
            box-shadow: var(--text-glow);
            margin-bottom: 20px;
        }

        .info-row {
            padding: 10px 0;
            border-bottom: 1px dashed rgba(255, 255, 0, 0.2);
            display: flex;
            justify-content: space-between;
        }

        .label { color: #ffff88; font-size: 14px; font-weight: bold; }
        .value { color: #ffffff; font-weight: bold; text-shadow: 0 0 5px rgba(255,255,255,0.3); }

        .map-container {
            width: 100%;
            height: 250px;
            border-radius: 0px;
            border: 1px solid var(--border);
            overflow: hidden;
            margin-top: 15px;
        }

        /* Custom Animated Hacking Live Graph Stream - Green hi rakha hai */
        .terminal-loader {
            background: var(--panel-bg);
            border: 1px dashed #00ff00;
            padding: 25px;
            color: #00ff00;
            font-size: 13px;
            line-height: 1.8;
            margin-bottom: 20px;
        }

        .graph-line {
            white-space: pre;
            color: #00dd00;
            font-weight: bold;
            margin: 10px 0;
            overflow: hidden;
            animation: flux 0.5s infinite alternate;
        }

        /* Try Another Number - Controlled Layout Alert Box */
        .not-found {
            text-align: center;
            color: #ff3333;
            background: rgba(30, 5, 5, 0.9);
            padding: 25px;
            border: 2px solid #ff3333;
            box-shadow: 0 0 15px rgba(255, 51, 51, 0.4);
            font-weight: bold;
            letter-spacing: 1px;
        }

        footer {
            text-align: center;
            padding: 50px 20px;
            font-size: 13px;
            letter-spacing: 2px;
            color: #777;
            font-weight: bold;
            border-top: 1px solid rgba(255, 255, 0, 0.05);
            margin-top: 40px;
        }

        @keyframes pulse {
            0% { transform: scale(1); opacity: 0.8; }
            50% { transform: scale(1.05); opacity: 1; text-shadow: 0 0 15px var(--primary); }
            100% { transform: scale(1); opacity: 0.8; }
        }

        @keyframes flux {
            0% { opacity: 0.4; }
            100% { opacity: 1; }
        }
    </style>
</head>
<body oncontextmenu="return false;"> <canvas id="matrixBg"></canvas>

    <div id="lockScreen">
        <div class="lock-card">
            <i class="fas fa-user-shield" style="font-size: 50px; color: var(--primary); text-shadow: var(--text-glow);"></i>
            <h2>ACCESS DENIED</h2>
            <p>Follow my WhatsApp channel to unlock Sim Database Tool.</p>
            <button onclick="unlockTool()" class="btn-unlock">
                <i class="fab fa-whatsapp"></i> FOLLOW TO UNLOCK
            </button>
        </div>
    </div>

    <div class="header">
        <div class="logo-area">
            <i class="fas fa-user-secret"></i>
        </div>
        <h1>S QUEEN Sim Database</h1>
        <p style="color: #666; font-size: 12px; letter-spacing: 4px; margin-top: 5px;">PREMIUM SIM-DATABASE SYSTEM</p>
    </div>

    <div class="search-container">
        <div class="input-box">
            <input type="text" id="targetInput" placeholder="Enter Number (3xxxxxxxxx) or CNIC">
            <button class="btn-search" onclick="startSearch()">SCAN</button>
        </div>
    </div>

    <div id="resultArea"></div>

    <footer>
        Developer S QUEEN HACKER 🦅 🔥 🙌
    </footer>

    <script>
        // Matrix Background Core Line Generator Logic
        const canvas = document.getElementById('matrixBg');
        const ctx = canvas.getContext('2d');

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        resizeCanvas();
        window.addEventListener('resize', resizeCanvas);

        const alphabet = "ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789@#$%&*+-={}[]";
        const fontSize = 14;
        const columns = canvas.width / fontSize;
        const rainDrops = Array.from({ length: columns }).fill(1);

        function drawMatrix() {
            ctx.fillStyle = 'rgba(10, 10, 10, 0.05)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = '#0F0';
            ctx.font = fontSize + 'px monospace';

            for (let i = 0; i < rainDrops.length; i++) {
                const text = alphabet.charAt(Math.floor(Math.random() * alphabet.length));
                ctx.fillText(text, i * fontSize, rainDrops[i] * fontSize);
                if (rainDrops[i] * fontSize > canvas.height && Math.random() > 0.975) {
                    rainDrops[i] = 0;
                }
                rainDrops[i]++;
            }
        }
        setInterval(drawMatrix, 30);

        // Core App Routing Implementations
        function unlockTool() {
            window.open('https://whatsapp.com/channel/0029VbCbXsu42DcjxyGmeX2P', '_blank');
            setTimeout(() => { $('#lockScreen').fadeOut(); }, 5000);
        }

        function displayData(data, query) {
            const name = data.full_name || data.Name || data.NAME || 'N/A';
            const phone = data.phone || data.Mobile || data.NUMBER || query;
            const cnic = data.cnic || data.CNIC || 'N/A';
            const address = data.address || data.Address || "Pakistan";
            
            const mapUrl = `https://maps.google.com/maps?q=${encodeURIComponent(address)}&t=k&z=13&ie=UTF8&iwloc=&output=embed`;

            $('#resultArea').html(`
                <div class="data-card">
                    <div class="info-row"><span class="label">NAME:</span> <span class="value">${name}</span></div>
                    <div class="info-row"><span class="label">NUMBER:</span> <span class="value">${phone}</span></div>
                    <div class="info-row"><span class="label">CNIC:</span> <span class="value">${cnic}</span></div>
                    <div class="info-row"><span class="label">ADDRESS:</span> <span class="value">${address}</span></div>
                    
                    <div style="margin-top:20px; font-weight:bold; font-size:14px; color:var(--primary); letter-spacing: 1px;">
                        <i class="fas fa-map-marker-alt"></i> SATELLITE MAP MATRIX:
                    </div>
                    <div class="map-container">
                        <iframe width="100%" height="100%" frameborder="0" style="border:0" src="${mapUrl}" allowfullscreen></iframe>
                    </div>
                </div>
            `).fadeIn();
        }

        // Custom Terminal Stream Data Simulator for Hacking Look
        function generateHackingGraph() {
            const lines = [
                " [!] CONNECTING TO GLOBAL CENTRAL NODE...",
                " [+] INJECTING INTERFACE REQUEST STATE PACKETS...",
                " [~] OVERFLOWING BUFFER ADDR: 0x7FFF54BA800",
                " ----------------------------------------",
                " █▒▒▒▒▒▒▒▒▒ 10% [GRID STREAM ENGINE LOADED]",
                " ████▒▒▒▒▒▒ 40% [FETCHING DB ENTRIES]",
                " ███████▒▒▒ 75% [PARSING ROW CODES]",
                " ██████████ 100% [COMPILING RESULTS]"
            ];
            
            let htmlStream = '<div class="terminal-loader">';
            htmlStream += '<div style="margin-bottom:10px;"><i class="fas fa-skull-crossbones fa-spin"></i> SYSTEM INJECTOR HIGH-VELOCITY ACTIVE...</div>';
            htmlStream += '<div class="graph-line">▲▼▲  ▉▊▋▌▍▎▏ ▲▼▲  ▉▊▋▌▍▎▏ ▲▼▲</div>';
            
            lines.forEach(line => {
                htmlStream += `<div>${line}</div>`;
            });
            
            htmlStream += '<div class="graph-line">██████████████████████████████████████</div>';
            htmlStream += '</div>';
            return htmlStream;
        }

        async function startSearch() {
            const query = $('#targetInput').val().trim();
            if(!query) return alert("Please enter a target payload number!");

            // Injecting the custom terminal stream graphics panel
            $('#resultArea').html(generateHackingGraph()).fadeIn();

            // Deliberate small timeout delay to let the terminal graphics be readable like actual loading
            await new Promise(resolve => setTimeout(resolve, 1500));

            try {
                // --- TRY API 1 (famofc) ---
                const resp1 = await fetch(`https://famofc.site/api/database.php?q=${query}`);
                const res1 = await resp1.json();

                if(res1.success && res1.data && res1.data.records && res1.data.records.length > 0) {
                    displayData(res1.data.records[0], query);
                } else {
                    // --- FAILOVER: TRY API 2 (S QUEEN) ---
                    const resp2 = await fetch(`https://wasifali-sim-info.netlify.app/api/search?phone=${query}`);
                    const res2 = await resp2.json();

                    if(res2 && res2.records && res2.records.length > 0) {
                        displayData(res2.records[0], query);
                    } else {
                        $('#resultArea').html('<div class="not-found"><i class="fas fa-exclamation-triangle"></i> DATA NOT FOUND! TRY ANOTHER NUMBER</div>');
                    }
                }
            } catch (error) {
                // Secondary backup structure block
                try {
                    const resp2 = await fetch(`https://wasifali-sim-info.netlify.app/api/search?phone=${query}`);
                    const res2 = await resp2.json();
                    if(res2 && res2.records && res2.records.length > 0) {
                        displayData(res2.records[0], query);
                    } else {
                        $('#resultArea').html('<div class="not-found"><i class="fas fa-exclamation-triangle"></i> DATA NOT FOUND! TRY ANOTHER NUMBER</div>');
                    }
                } catch (e) {
                    $('#resultArea').html('<div class="not-found"><i class="fas fa-exclamation-triangle"></i> DATA NOT FOUND! TRY ANOTHER NUMBER</div>');
                }
            }
        }

        // --- CODE PROTECTION LOGIC (F12, View-Source, Inspect Element keys block) ---
        document.addEventListener('keydown', function(e) {
            // F12 Block
            if (e.keyCode === 123) {
                e.preventDefault();
                return false;
            }
            // Ctrl+Shift+I (Inspect), Ctrl+Shift+J (Console)
            if (e.ctrlKey && e.shiftKey && (e.keyCode === 73 || e.keyCode === 74)) {
                e.preventDefault();
                return false;
            }
            // Ctrl+U (View Source)
            if (e.ctrlKey && e.keyCode === 85) {
                e.preventDefault();
                return false;
            }
            // Ctrl+S (Save page)
            if (e.ctrlKey && e.keyCode === 83) {
                e.preventDefault();
                return false;
            }
        });
    </script>
</body>
</html>
